# ==========================================
# CampusIQ+ Application Configuration
# ==========================================
spring.application.name=campusiq-backend
server.port=8080
server.servlet.context-path=/api

# ==========================================
# Database
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/campusiq_v6?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Kalki@12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# JWT
# ==========================================
app.jwt.secret=${JWT_SECRET:CampusIQPlusSecretKey2024SuperSecureJWTSigningKey256BitsOrMoreForHMACSHA}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}

# ==========================================
# Mail
# ==========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:kalkitarun04@gmail.com}
spring.mail.password=${MAIL_PASSWORD:jjxh ourn vbwx ehel}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:noreply@campusiq.com}

# ==========================================
# Razorpay
# ==========================================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_SI50pw3ScFGRcS}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:s6av3mitvaXj9TcC04nOnR1e}
razorpay.currency=INR

# ==========================================
# Ollama  (local AI — replaces OpenAI)
# ==========================================
# Make sure Ollama is running:  ollama serve
# Pull the model first:         ollama pull llama3
ollama.base-url=http://localhost:11434
ollama.model=llama3
ollama.timeout-seconds=60

# ==========================================
# Firebase (optional - app works without it)
# ==========================================
firebase.config.path=${FIREBASE_CONFIG_PATH:firebase-service-account.json}

# ==========================================
# OTP
# ==========================================
app.otp.expiry-minutes=10
app.otp.length=6

# ==========================================
# CORS
# ==========================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:4200}

# ==========================================
# Actuator
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ==========================================
# Logging
# ==========================================
logging.level.com.campusiq=INFO
logging.level.org.springframework.security=WARN